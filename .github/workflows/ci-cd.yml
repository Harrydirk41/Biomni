name: Biomni PKPD CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   push to main        → lint + test + build + deploy
#   pull_request        → lint + test only (no build, no deploy)
#   schedule (Mon 2am)  → weekly PKPD benchmark posted to LangSmith
#   workflow_dispatch   → manual trigger with optional tier override
#
# paths-ignore: docs/** and *.md changes never trigger a Docker build
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"   # weekly benchmark — every Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Override DEPLOY_TARGET (lambda/fargate/ec2/eks/all)"
        required: false
        default: ""

# ─────────────────────────────────────────────────────────────────────────────
# Repository secrets required (Settings → Secrets → Actions)
#
#   AWS_ROLE_ARN          arn:aws:iam::314567760197:role/github-oidc-role
#   AWS_REGION            us-west-2
#   ECR_REPOSITORY        biomni
#   DEPLOY_TARGET         fargate   (or lambda | ec2 | eks | all)
#   ECS_CLUSTER           biomni-cluster
#   ECS_SERVICE_FARGATE   biomni-api
#   ECS_SERVICE_EC2       biomni-api-ec2        (only if using EC2 tier)
#   LAMBDA_FUNCTION_NAME  biomni-agent          (only if using Lambda tier)
#   EKS_CLUSTER_NAME      biomni                (only if using EKS tier)
#   LANGCHAIN_API_KEY     ls__...               (for weekly benchmark)
# ─────────────────────────────────────────────────────────────────────────────

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG:      ${{ github.sha }}
  PYTHON_VERSION: "3.11"

permissions:
  id-token: write   # required for OIDC AWS auth
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Job 1a: Lint
  # Runs on every push and every PR. Fast — fails early before tests run.
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: |
          ruff check biomni/tool/dmpk.py \
                     biomni/tool/poppk.py \
                     biomni/tool/pbpk.py \
                     biomni/tool/bioanalytical.py \
                     biomni/tool/cdisc_io.py \
                     biomni/agent/pkpd_agent.py \
                     biomni/eval/pkpd_benchmark.py \
                     tests/ \
            --select E,F,W \
            --ignore E501 \
            --output-format github

  # ───────────────────────────────────────────────────────────────────────────
  # Job 1b: Unit tests
  # Runs on every push and every PR. Tests pure Python logic — no LLM, no R.
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pytest-cov \
            numpy \
            pandas \
            scipy \
            pydantic \
            langchain-core \
            langgraph

      - name: Install biomni package (editable)
        run: pip install -e . --no-deps

      - name: Run PKPD unit tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=biomni/tool \
            --cov=biomni/agent/pkpd_agent.py \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Build Docker image & push to ECR
  # Runs only on push to main (not on PRs or schedule).
  # Image is tagged with the git SHA for exact traceability.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to:   type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Output image URI
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
            >> "$GITHUB_OUTPUT"

      - name: Print image URI (audit trail)
        run: |
          echo "Image: ${{ steps.image.outputs.uri }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor:  ${{ github.actor }}"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3a: Deploy → Lambda
  # ───────────────────────────────────────────────────────────────────────────
  deploy-lambda:
    name: Deploy → Lambda
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (secrets.DEPLOY_TARGET == 'lambda' || secrets.DEPLOY_TARGET == 'all' ||
       inputs.deploy_target == 'lambda' || inputs.deploy_target == 'all')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Update Lambda function image
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --image-uri    "${{ needs.build.outputs.image }}"

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}"

      - name: Publish version and promote live alias
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --query Version --output text)
          aws lambda update-alias \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --name live \
            --function-version "$VERSION" 2>/dev/null || \
          aws lambda create-alias \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --name live \
            --function-version "$VERSION"
          echo "Lambda ${{ secrets.LAMBDA_FUNCTION_NAME }} → version $VERSION → alias live"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3b: Deploy → ECS Fargate
  # ───────────────────────────────────────────────────────────────────────────
  deploy-fargate:
    name: Deploy → ECS Fargate
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (secrets.DEPLOY_TARGET == 'fargate' || secrets.DEPLOY_TARGET == 'all' ||
       inputs.deploy_target == 'fargate' || inputs.deploy_target == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition biomni \
            --query taskDefinition > task-def.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name:  biomni
          image:           ${{ needs.build.outputs.image }}

      - name: Deploy to Fargate (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_SERVICE_FARGATE }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3c: Deploy → ECS EC2 (GPU)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-ecs-ec2:
    name: Deploy → ECS EC2
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (secrets.DEPLOY_TARGET == 'ec2' || secrets.DEPLOY_TARGET == 'all' ||
       inputs.deploy_target == 'ec2' || inputs.deploy_target == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Download GPU task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition biomni-gpu \
            --query taskDefinition > task-def-gpu.json

      - name: Render new GPU task definition
        id: task-def-gpu
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-gpu.json
          container-name:  biomni
          image:           ${{ needs.build.outputs.image }}

      - name: Deploy to ECS EC2 (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def-gpu.outputs.task-definition }}
          service:                  ${{ secrets.ECS_SERVICE_EC2 }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3d: Deploy → EKS
  # ───────────────────────────────────────────────────────────────────────────
  deploy-eks:
    name: Deploy → EKS
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (secrets.DEPLOY_TARGET == 'eks' || secrets.DEPLOY_TARGET == 'all' ||
       inputs.deploy_target == 'eks' || inputs.deploy_target == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name   "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Sync Anthropic API key to Kubernetes secret
        run: |
          ANTHROPIC_KEY=$(aws secretsmanager get-secret-value \
            --secret-id biomni/anthropic-key \
            --query SecretString --output text)
          kubectl create secret generic biomni-secrets \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_KEY" \
            --namespace biomni \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        run: |
          kubectl set image deployment/biomni-api \
            biomni="${{ needs.build.outputs.image }}" \
            --namespace biomni

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/biomni-api \
            --namespace biomni \
            --timeout=600s

      - name: Verify pods healthy
        run: kubectl get pods -n biomni -l app=biomni-api

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Weekly PKPD benchmark (schedule only)
  # Posts 16-case evaluation results to LangSmith every Monday 02:00 UTC.
  # Never blocks deployment — runs independently on a schedule.
  # ───────────────────────────────────────────────────────────────────────────
  benchmark:
    name: Weekly PKPD Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install benchmark dependencies
        run: |
          pip install \
            langsmith \
            langchain-anthropic \
            langchain-core \
            langgraph \
            numpy \
            pandas \
            scipy
          pip install -e . --no-deps

      - name: Upload dataset (idempotent — recreates if changed)
        env:
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        run: python -m biomni.eval.pkpd_benchmark --upload-dataset

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY:    ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT:    biomni-pkpd-ci
        run: |
          python -m biomni.eval.pkpd_benchmark \
            --run \
            --model us.anthropic.claude-haiku-4-5-20251001-v1:0 \
            --source Bedrock \
            --experiment "ci-$(date +%Y%m%d)"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 5: Notify on any failure
  # ───────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build, deploy-lambda, deploy-fargate, deploy-ecs-ec2, deploy-eks]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "::error::CI/CD pipeline failed."
          echo "Commit:  ${{ github.sha }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Actor:   ${{ github.actor }}"
          echo "Check the failed job above for details."
