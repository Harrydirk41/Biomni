apiVersion: apps/v1
kind: Deployment
metadata:
  name: biomni-api
  namespace: biomni
  labels:
    app: biomni-api
spec:
  replicas: 2                        # start with 2; HPA will adjust
  selector:
    matchLabels:
      app: biomni-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                    # spin up 1 new pod before killing old
      maxUnavailable: 0              # zero downtime during deploys
  template:
    metadata:
      labels:
        app: biomni-api
    spec:
      serviceAccountName: biomni-sa  # grants AWS permissions via IRSA

      # Pull image from ECR — no docker credentials needed (IRSA handles it)
      containers:
        - name: biomni-api
          image: 314567760197.dkr.ecr.us-west-2.amazonaws.com/biomni:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            - configMapRef:
                name: biomni-config

          resources:
            requests:
              cpu: "512m"            # 0.5 vCPU guaranteed
              memory: "1Gi"
            limits:
              cpu: "2000m"           # burst up to 2 vCPU
              memory: "3Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60  # agent takes ~30s to init
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3

      # Spread pods across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: biomni-api
