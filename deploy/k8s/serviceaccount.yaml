# IAM Roles for Service Accounts (IRSA)
# The pod uses this SA to get AWS permissions (Bedrock, DynamoDB)
# without hardcoding any credentials in the container.
#
# Before applying, create the IAM role and annotate it:
#   eksctl create iamserviceaccount \
#     --cluster biomni-cluster \
#     --namespace biomni \
#     --name biomni-sa \
#     --attach-policy-arn arn:aws:iam::314567760197:policy/BiomniECSPolicy \
#     --approve
#
# Then replace the annotation ARN below with the one eksctl printed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biomni-sa
  namespace: biomni
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::314567760197:role/biomni-eks-role
