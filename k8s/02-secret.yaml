# DO NOT commit real keys here.
# In production use External Secrets Operator synced from AWS Secrets Manager.
# This file is a template — values are injected by CI/CD via:
#   kubectl create secret generic biomni-secrets \
#     --from-literal=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
#     --namespace biomni --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: biomni-secrets
  namespace: biomni
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
